<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>血染钟楼 - AI说书人助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif SC', serif; background-color: #1a1a1a; background-image: radial-gradient(#2d1b1b 1px, transparent 1px); background-size: 20px 20px; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #e53e3e; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glass-panel { background: rgba(17, 24, 39, 0.9); backdrop-filter: blur(12px); }
        .wizard-step-active { color: #f87171; font-weight: bold; border-bottom: 2px solid #f87171; }
        .wizard-step-inactive { color: #6b7280; border-bottom: 2px solid transparent; }
    </style>
</head>
<body class="text-gray-200 min-h-screen p-4 md:p-8 flex justify-center items-start">
    <div class="max-w-4xl w-full glass-panel border border-red-900 p-6 md:p-10 rounded-2xl shadow-2xl relative overflow-hidden mt-2">
        <!-- Decoration -->
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-red-800 via-red-500 to-red-800"></div>
        
        <h1 class="text-3xl md:text-4xl font-black mb-2 text-center text-red-500 tracking-wider">血染钟楼</h1>
        <h2 class="text-xl md:text-2xl font-bold mb-8 text-center text-gray-400">说书人电子魔典</h2>
        
        <!-- Wizard Progress Tracker -->
        <div class="flex justify-between items-center mb-8 border-b border-gray-700 pb-2 text-sm md:text-base" id="wizardProgress">
            <div id="nav-step1" class="pb-2 wizard-step-active flex-1 text-center transition-all duration-300">1. 玩家设置</div>
            <div id="nav-step2" class="pb-2 wizard-step-inactive flex-1 text-center transition-all duration-300">2. 魔典卡池</div>
            <div id="nav-step3" class="pb-2 wizard-step-inactive flex-1 text-center transition-all duration-300">3. 身份分发</div>
            <div id="nav-step4" class="pb-2 wizard-step-inactive flex-1 text-center transition-all duration-300">4. 实时场控</div>
        </div>

        <!-- ==================== Step 1: Players ==================== -->
        <div id="page-step1" class="space-y-6 block">
            <div>
                <label class="block mb-2 font-bold text-red-400 text-lg">游戏人数 (8-15人)</label>
                <input type="number" id="playerCount" min="8" max="15" value="10" class="w-full bg-gray-800 border border-gray-700 text-white p-3 rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
            </div>
            
            <div>
                <label class="block mb-3 font-bold text-red-400 text-lg">玩家姓名 (按座位顺序)</label>
                <p class="text-xs text-gray-500 mb-3">可以留空，后续步骤可仅凭座位号识别。</p>
                <div id="playerNamesContainer" class="grid grid-cols-2 md:grid-cols-3 gap-3">
                    <!-- Name inputs generated by JS -->
                </div>
            </div>

            <div class="flex justify-end mt-8 border-t border-gray-700 pt-6">
                <button onclick="goToStep2()" class="bg-gradient-to-r from-red-800 to-red-900 hover:from-red-700 hover:to-red-800 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-all transform hover:scale-[1.02]">
                    下一步：生成角色 ➡️
                </button>
            </div>
        </div>

        <!-- ==================== Step 2: Roles Pool ==================== -->
        <div id="page-step2" class="space-y-6 hidden">
            <div>
                <label class="block mb-2 font-bold text-red-400 text-lg">选择剧本</label>
                <select id="scriptSelect" class="w-full bg-gray-800 border border-gray-700 text-white p-3 rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
                    <option value="tb">暗流涌动 (Trouble Brewing)</option>
                    <option value="bmr">暗月初升 (Bad Moon Rising)</option>
                    <option value="snv">梦殒春宵 (Sects & Violets)</option>
                </select>
            </div>
            
            <div class="pt-2">
                <label class="block mb-3 font-bold text-red-400 text-lg flex justify-between items-center">
                    <span>锁定特定角色入局</span>
                    <span class="text-xs text-gray-400 font-normal" id="baseDistText">标准配置: -</span>
                </label>
                <p class="text-gray-500 text-xs mb-3">在这里选择您<b>必须</b>要放入这局游戏的角色卡。未指定的卡位请保持“🎲 随机”，系统会自动根据人数和标准比例（包含男爵等特殊技能修正）为您补齐剩余魔典。</p>
                <div id="lockedRolesContainer" class="grid grid-cols-2 md:grid-cols-3 gap-3">
                    <!-- Dropdowns generated by JS -->
                </div>
            </div>

            <button onclick="generateSetup()" id="genBtn" class="w-full bg-gray-800 hover:bg-gray-700 border border-gray-600 text-white font-bold py-4 rounded-xl shadow transition-all flex justify-center items-center gap-2 text-lg mt-4">
                <span>🔮 自动补齐并生成魔典建议</span>
            </button>

            <!-- Loading & Result -->
            <div id="genLoading" class="hidden flex justify-center items-center gap-3 mt-8 text-gray-400">
                <div class="spinner"></div>
                <span>大恶魔正在构建命运...</span>
            </div>

            <div id="genResult" class="hidden mt-6">
                <div class="bg-gray-800 border border-gray-700 p-6 rounded-xl relative shadow-inner">
                    <div class="absolute -top-3 left-6 bg-red-600 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider text-white shadow-sm">魔典卡池与分析</div>
                    <div id="gen-content" class="text-gray-300 leading-relaxed text-base mt-2"></div>
                </div>
            </div>

            <div class="flex justify-between mt-8 pt-6 border-t border-gray-700">
                <button onclick="goToStep1()" class="bg-gray-800 hover:bg-gray-700 text-white font-bold py-3 px-6 rounded-xl transition-all">
                    ⬅️ 上一步
                </button>
                <button onclick="goToStep3()" id="btn-next-step3" class="bg-gradient-to-r from-red-800 to-red-900 hover:from-red-700 hover:to-red-800 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-all transform hover:scale-[1.02] hidden">
                    下一步：分配角色 ➡️
                </button>
            </div>
        </div>

        <!-- ==================== Step 3: Assignment ==================== -->
        <div id="page-step3" class="space-y-6 hidden">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-red-400">身份分发</h3>
                <button onclick="randomizeAssignments()" class="bg-gray-700 hover:bg-gray-600 text-white text-sm px-4 py-2 rounded-lg font-bold flex items-center gap-2 transition">
                    <span>🎲 重新随机分配</span>
                </button>
            </div>
            
            <p class="text-gray-400 text-sm mb-4">系统已将生成的魔典卡池随机发给场上玩家。确认无误后点击“开始游戏”进入场控界面。</p>

            <div id="assignmentContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                <!-- Assignment List generated by JS -->
            </div>

            <div class="flex justify-between mt-8 pt-6 border-t border-gray-700">
                <button onclick="goToStep2()" class="bg-gray-800 hover:bg-gray-700 text-white font-bold py-3 px-6 rounded-xl transition-all">
                    ⬅️ 上一步
                </button>
                <button onclick="startGame()" class="bg-gradient-to-r from-red-800 to-red-900 hover:from-red-700 hover:to-red-800 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-all transform hover:scale-[1.02]">
                    🚀 开始游戏
                </button>
            </div>
        </div>

        <!-- ==================== Step 4: Live Grimoire ==================== -->
        <div id="page-step4" class="space-y-6 hidden">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-red-400">实时魔典追踪</h3>
                <button onclick="resetGame()" class="text-sm bg-gray-800 hover:bg-red-900 border border-gray-600 hover:border-red-700 px-4 py-2 rounded-lg text-white font-bold transition">结束游戏 (回到首页)</button>
            </div>
            <p class="text-xs text-gray-500 mb-6">为每个玩家标记死亡、醉酒或其他状态。点击标签右侧的 '×' 即可移除状态。</p>
            
            <div id="liveGrimoireContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
                <!-- Live Player Cards generated by JS -->
            </div>

            <div class="bg-gray-800 border border-gray-700 p-6 rounded-xl relative shadow-inner">
                <div class="absolute -top-3 left-6 bg-purple-600 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider text-white shadow-sm">AI 场控求助</div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-2">
                    <div>
                        <label class="block mb-1 text-gray-400 text-sm">局面倾向</label>
                        <select id="advantage" class="w-full bg-gray-900 border border-gray-600 text-white p-2 rounded focus:ring-1 focus:ring-purple-500 outline-none text-sm">
                            <option value="good_strong">🔵 好人优势极大</option>
                            <option value="balanced">⚖️ 势均力敌</option>
                            <option value="evil_strong">🔴 邪恶优势极大</option>
                        </select>
                    </div>
                    <div>
                        <label class="block mb-1 text-gray-400 text-sm">当前游戏阶段</label>
                        <select id="phase" class="w-full bg-gray-900 border border-gray-600 text-white p-2 rounded focus:ring-1 focus:ring-purple-500 outline-none text-sm">
                            <option value="early">🌙 游戏前期 (信息收集中)</option>
                            <option value="mid">🔥 游戏中期 (逻辑交锋期)</option>
                            <option value="late">⚔️ 游戏后期 (决战)</option>
                        </select>
                    </div>
                </div>
                <button onclick="analyzeBalance()" id="analyzeBtn" class="w-full mt-4 bg-purple-800 hover:bg-purple-700 text-white font-bold py-2 rounded shadow transition flex justify-center items-center gap-2">
                    <span>🔮 生成局势平衡建议</span>
                </button>
                <div id="balanceLoading" class="hidden flex justify-center items-center gap-2 mt-4 text-gray-400 text-sm">
                    <div class="spinner" style="width: 16px; height: 16px; border-width: 2px;"></div>
                    <span>推演中...</span>
                </div>
                <div id="balanceResult" class="hidden mt-4 text-sm text-gray-300 bg-gray-900 p-4 rounded border border-gray-700 whitespace-pre-line leading-relaxed">
                    <!-- Advice goes here -->
                </div>
            </div>
            
            <div class="flex justify-start mt-8 pt-6 border-t border-gray-700">
                <button onclick="goBackToStep3()" class="bg-gray-800 hover:bg-gray-700 text-white font-bold py-3 px-6 rounded-xl transition-all">
                    ⬅️ 上一步 (返回调整分配)
                </button>
            </div>
        </div>
        
    </div>

    <script>
        // --- 核心角色数据 ---
        const SCRIPTS = {
            "tb": {
                name: "暗流涌动 (Trouble Brewing)",
                townsfolk: ["洗衣妇", "图书管理员", "调查员", "厨师", "共情者", "占卜师", "送葬者", "僧侣", "守鸦人", "处女", "杀手", "士兵", "镇长"],
                outsiders: ["管家", "醉汉", "隐士", "圣徒"],
                minions: ["毒师", "间谍", "猩红女人", "男爵"],
                demons: ["小恶魔"]
            },
            "bmr": {
                name: "暗月初升 (Bad Moon Rising)",
                townsfolk: ["祖母", "水手", "侍女", "驱魔人", "旅店老板", "赌徒", "八卦", "侍臣", "教授", "吟游诗人", "茶艺师", "和平主义者", "弄臣"],
                outsiders: ["莽夫", "月之子", "修补匠", "疯子"],
                minions: ["教父", "魔鬼代言人", "刺客", "主谋"],
                demons: ["僵怖", "普卡", "沙巴洛斯", "珀"]
            },
            "snv": {
                name: "梦殒春宵 (Sects & Violets)",
                townsfolk: ["钟表匠", "筑梦师", "舞蛇人", "数学家", "卖花女孩", "城镇公告员", "神谕者", "博学者", "女裁缝", "哲学家", "艺术家", "杂耍艺人", "贤者"],
                outsiders: ["畸形秀演员", "理发师", "心上人", "呆瓜"],
                minions: ["镜像双子", "女巫", "洗脑师", "麻脸巫婆"],
                demons: ["方古", "亡骨魔", "诺-达鲺", "涡流"]
            }
        };

        const DIST = {
            8: [5, 1, 1, 1], 9: [5, 2, 1, 1], 10: [7, 0, 2, 1], 11: [7, 1, 2, 1],
            12: [7, 2, 2, 1], 13: [9, 0, 3, 1], 14: [9, 1, 3, 1], 15: [9, 2, 3, 1]
        };

        // --- State ---
        let playerNames = [];
        let generatedDeck = []; // The pool of roles
        let liveGrimoire = [];  // Current game state
        let savedRolesSelections = []; // Saves the selected dropdown values in step 2

        // --- Event Listeners ---
        document.getElementById('playerCount').addEventListener('change', renderPlayerNameInputs);
        document.getElementById('scriptSelect').addEventListener('change', renderRolePoolDropdowns);
        
        window.addEventListener('DOMContentLoaded', () => {
            renderPlayerNameInputs();
        });

        // --- Navigation ---
        function showPage(pageId, stepNum) {
            ['page-step1', 'page-step2', 'page-step3', 'page-step4'].forEach(p => {
                document.getElementById(p).classList.add('hidden');
            });
            document.getElementById(pageId).classList.remove('hidden');

            for (let i = 1; i <= 4; i++) {
                const nav = document.getElementById('nav-step' + i);
                if (i === stepNum) {
                    nav.className = "pb-2 wizard-step-active flex-1 text-center transition-all duration-300 transform scale-105";
                } else {
                    nav.className = "pb-2 wizard-step-inactive flex-1 text-center transition-all duration-300 opacity-50";
                }
            }
        }

        // --- Step 1 ---
        function renderPlayerNameInputs() {
            let count = parseInt(document.getElementById('playerCount').value);
            if (isNaN(count) || count < 8) count = 8;
            if (count > 15) count = 15;

            const container = document.getElementById('playerNamesContainer');
            
            // Save current
            const currentNames = [];
            container.querySelectorAll('.p-name').forEach(inp => currentNames.push(inp.value));

            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const wrap = document.createElement('div');
                wrap.innerHTML = `
                    <div class="flex items-center bg-gray-800 rounded border border-gray-700 overflow-hidden">
                        <div class="bg-gray-700 text-gray-400 font-bold px-3 py-2 text-sm">${i+1}</div>
                        <input type="text" class="p-name w-full bg-transparent text-white text-sm p-2 outline-none" placeholder="玩家名 (可选)">
                    </div>
                `;
                if (currentNames[i]) {
                    wrap.querySelector('.p-name').value = currentNames[i];
                }
                container.appendChild(wrap);
            }
        }

        function goToStep2() {
            playerNames = [];
            document.querySelectorAll('.p-name').forEach(inp => playerNames.push(inp.value.trim()));
            renderRolePoolDropdowns();
            showPage('page-step2', 2);
        }
        
        function goToStep1() {
            showPage('page-step1', 1);
        }

        // --- Step 2 ---
        function renderRolePoolDropdowns() {
            const count = playerNames.length;
            const scriptKey = document.getElementById('scriptSelect').value;
            const script = SCRIPTS[scriptKey];
            const dist = DIST[count];
            
            document.getElementById('baseDistText').innerText = `标准配置: 村民${dist[0]}/外乡人${dist[1]}/爪牙${dist[2]}/恶魔${dist[3]}`;

            const container = document.getElementById('lockedRolesContainer');
            
            // Collect currently selected values if any before clearing
            if(container.children.length > 0) {
                savedRolesSelections = [];
                container.querySelectorAll('select').forEach(s => savedRolesSelections.push(s.value));
            }

            container.innerHTML = '';
            
            for (let i = 0; i < count; i++) {
                const selectWrap = document.createElement('div');
                selectWrap.className = "relative";
                
                const select = document.createElement('select');
                select.className = "w-full bg-gray-800 border border-gray-700 text-gray-300 text-sm p-2.5 rounded-lg focus:ring-2 focus:ring-red-500 outline-none appearance-none";
                
                let optionsHTML = `<option value="">🎲 随机 (卡位 ${i+1})</option>`;
                optionsHTML += `<optgroup label="👼 村民">` + script.townsfolk.map(r => `<option value="${r}">${r}</option>`).join('') + `</optgroup>`;
                optionsHTML += `<optgroup label="🤡 外乡人">` + script.outsiders.map(r => `<option value="${r}">${r}</option>`).join('') + `</optgroup>`;
                optionsHTML += `<optgroup label="😈 爪牙">` + script.minions.map(r => `<option value="${r}">${r}</option>`).join('') + `</optgroup>`;
                optionsHTML += `<optgroup label="👿 恶魔">` + script.demons.map(r => `<option value="${r}">${r}</option>`).join('') + `</optgroup>`;
                
                select.innerHTML = optionsHTML;
                
                if (savedRolesSelections[i] && select.querySelector(`option[value="${savedRolesSelections[i]}"]`)) {
                    select.value = savedRolesSelections[i];
                    if(select.value) select.classList.add('text-white', 'border-red-800', 'bg-red-950');
                }

                select.addEventListener('change', function() {
                    if(this.value) {
                        this.classList.add('text-white', 'border-red-800', 'bg-red-950');
                    } else {
                        this.classList.remove('text-white', 'border-red-800', 'bg-red-950');
                    }
                });

                selectWrap.appendChild(select);
                
                const arrow = document.createElement('div');
                arrow.className = "pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-400";
                arrow.innerHTML = `<svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>`;
                selectWrap.appendChild(arrow);

                container.appendChild(selectWrap);
            }

            document.getElementById('btn-next-step3').classList.add('hidden');
            document.getElementById('genResult').classList.add('hidden');
        }

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function pickRoles(pool, count, locked) {
            const available = pool.filter(r => !locked.includes(r));
            return shuffle([...available]).slice(0, Math.max(0, count));
        }

        function getRoleTypeAndColor(role, script) {
            if (script.townsfolk.includes(role)) return { type: 'townsfolk', color: 'blue-400' };
            if (script.outsiders.includes(role)) return { type: 'outsider', color: 'yellow-400' };
            if (script.minions.includes(role)) return { type: 'minion', color: 'purple-400' };
            if (script.demons.includes(role)) return { type: 'demon', color: 'red-500' };
            return { type: 'unknown', color: 'gray-300' };
        }

        function generateSetup() {
            document.getElementById('genResult').classList.add('hidden');
            document.getElementById('genLoading').classList.remove('hidden');
            document.getElementById('genBtn').disabled = true;

            // Save selections before generating
            const container = document.getElementById('lockedRolesContainer');
            savedRolesSelections = [];
            container.querySelectorAll('select').forEach(s => savedRolesSelections.push(s.value));

            setTimeout(() => {
                const count = playerNames.length;
                const scriptKey = document.getElementById('scriptSelect').value;
                const script = SCRIPTS[scriptKey];
                
                const lockedRaw = savedRolesSelections.filter(v => v !== "");
                const lockedUnique = [...new Set(lockedRaw)]; 
                
                if (lockedRaw.length !== lockedUnique.length) {
                    alert("错误：您在卡池中锁定了重复的角色，请检查！");
                    document.getElementById('genLoading').classList.add('hidden');
                    document.getElementById('genBtn').disabled = false;
                    return;
                }

                let lockedT = [], lockedO = [], lockedM = [], lockedD = [];
                lockedUnique.forEach(r => {
                    if (script.townsfolk.includes(r)) lockedT.push(r);
                    else if (script.outsiders.includes(r)) lockedO.push(r);
                    else if (script.minions.includes(r)) lockedM.push(r);
                    else if (script.demons.includes(r)) lockedD.push(r);
                });

                let [t_cnt, o_cnt, m_cnt, d_cnt] = [...DIST[count]];
                let adjustedStr = "";
                
                if (lockedUnique.includes("男爵")) { o_cnt += 2; t_cnt -= 2; adjustedStr += " 【男爵】使外乡人+2；"; }
                if (lockedUnique.includes("方古")) { o_cnt += 1; t_cnt -= 1; adjustedStr += " 【方古】使外乡人+1；"; }
                if (lockedUnique.includes("教父")) { 
                    if (o_cnt === 0 || Math.random() > 0.5) { o_cnt += 1; t_cnt -= 1; adjustedStr += " 【教父】使外乡人+1；"; } 
                    else { o_cnt -= 1; t_cnt += 1; adjustedStr += " 【教父】使外乡人-1；"; }
                }
                if (o_cnt < 0) o_cnt = 0;

                const pickT = Math.max(0, t_cnt - lockedT.length);
                const pickO = Math.max(0, o_cnt - lockedO.length);
                const pickM = Math.max(0, m_cnt - lockedM.length);
                const pickD = Math.max(0, d_cnt - lockedD.length);

                const generatedT = pickRoles(script.townsfolk, pickT, lockedT);
                const generatedO = pickRoles(script.outsiders, pickO, lockedO);
                const generatedM = pickRoles(script.minions, pickM, lockedM);
                const generatedD = pickRoles(script.demons, pickD, lockedD);

                const finalT = [...lockedT, ...generatedT];
                const finalO = [...lockedO, ...generatedO];
                const finalM = [...lockedM, ...generatedM];
                const finalD = [...lockedD, ...generatedD];

                // Save deck state for next step
                generatedDeck = [...finalT, ...finalO, ...finalM, ...finalD];

                // --- Build HTML ---
                let html = `
                    <div class="mb-4 pb-2 border-b border-gray-700">
                        <h3 class="text-xl font-bold text-red-400 mb-1">【配置清单】 - ${script.name}</h3>
                        <p class="text-gray-400 text-sm">👥 <span class="text-white font-bold">总人数</span>: ${generatedDeck.length}人 (村民${finalT.length} / 外乡人${finalO.length} / 爪牙${finalM.length} / 恶魔${finalD.length})</p>
                    </div>
                `;
                
                if (adjustedStr) html += `<div class="mb-4 text-yellow-500 text-sm bg-yellow-900 bg-opacity-20 p-2 rounded border border-yellow-800">*(注: 由于技能影响，基础比例发生改变：${adjustedStr})*</div>`;

                html += `
                    <div class="space-y-3 mb-6 bg-gray-900 p-4 rounded-xl border border-gray-700 shadow-inner text-sm">
                        <div><span class="text-blue-400 font-bold">👼 村民:</span> <span class="text-gray-300 ml-2">${finalT.join("， ")}</span></div>
                        <div><span class="text-yellow-400 font-bold">🤡 外乡人:</span> <span class="text-gray-300 ml-2">${finalO.length > 0 ? finalO.join("， ") : "无"}</span></div>
                        <div><span class="text-purple-400 font-bold">😈 爪牙:</span> <span class="text-gray-300 ml-2">${finalM.join("， ")}</span></div>
                        <div><span class="text-red-500 font-bold">👿 恶魔:</span> <span class="text-gray-300 ml-2">${finalD.join("， ")}</span></div>
                    </div>
                `;

                html += `<h3 class="text-base font-bold text-red-400 mb-2">【AI 构筑解析】</h3><ul class="space-y-2 text-gray-300 list-none pl-1 text-sm">`;
                
                let aiComments = [];
                if (scriptKey === "tb") {
                    if (finalD.includes("小恶魔")) {
                        let c = `<li>💡 <span class="text-white font-bold">针对【小恶魔】</span>：小恶魔拥有自杀传刀的能力。`;
                        if (finalM.includes("猩红女人")) c += `配合【猩红女人】保底，邪恶阵营容错率极高。</li>`;
                        else c += `但本次无【猩红女人】，恶魔的传刀需极为谨慎。</li>`;
                        aiComments.push(c);
                    }
                    if (finalT.includes("占卜师") && !finalO.includes("隐士")) aiComments.push(`<li>💡 <span class="text-white font-bold">针对【占卜师】</span>：场上无【隐士】干扰，占卜师信息非常犀利。</li>`);
                    if (finalM.includes("毒师")) aiComments.push(`<li>💡 <span class="text-white font-bold">强力干扰</span>：【毒师】保证了好人无法无脑信任单一信息源。</li>`);
                } else if (scriptKey === "bmr") {
                    if (finalD.includes("普卡")) aiComments.push(`<li>💡 <span class="text-white font-bold">针对【普卡】</span>：普卡的毒会延时死亡，提醒中毒的村民不要盲目自信。</li>`);
                    if (finalD.includes("僵怖")) aiComments.push(`<li>💡 <span class="text-white font-bold">针对【僵怖】</span>：它能伪装死亡，说书人需小心处理白天的处决反馈。</li>`);
                    if (finalT.includes("水手") || finalT.includes("弄臣") || finalT.includes("茶艺师")) aiComments.push(`<li>💡 <span class="text-white font-bold">不死机制</span>：场上存在多种不死机制，这是好人盘逻辑的基石，但也让恶魔的击杀更具威慑力。</li>`);
                } else if (scriptKey === "snv") {
                    if (finalD.includes("涡流")) aiComments.push(`<li>💡 <span class="text-white font-bold">针对【涡流】</span>：所有好人得到的信息都是假的！考验好人能否快速发现涡流局。</li>`);
                    if (finalD.includes("方古")) aiComments.push(`<li>💡 <span class="text-white font-bold">针对【方古】</span>：恶魔可以跳跃到外乡人身上。外乡人在此局中不仅是累赘，更是巨大威胁。</li>`);
                    if (finalT.includes("艺术家") || finalT.includes("博学者")) aiComments.push(`<li>💡 <span class="text-white font-bold">信息爆发</span>：艺术家和博学者能提供终结比赛的信息，邪恶方必须优先解决他们。</li>`);
                }
                aiComments.push(`<li>🎯 <span class="text-white font-bold">建议</span>：确认卡池无误后，点击“下一步”将角色分发给玩家。</li>`);
                html += aiComments.join('') + `</ul>`;

                document.getElementById('genLoading').classList.add('hidden');
                document.getElementById('genResult').classList.remove('hidden');
                document.getElementById('gen-content').innerHTML = html;
                document.getElementById('genBtn').disabled = false;
                
                document.getElementById('btn-next-step3').classList.remove('hidden');
            }, 800);
        }

        // --- Step 3 ---
        function goToStep3() {
            randomizeAssignments();
            showPage('page-step3', 3);
        }

        function randomizeAssignments() {
            const scriptKey = document.getElementById('scriptSelect').value;
            const script = SCRIPTS[scriptKey];
            const shuffledDeck = shuffle([...generatedDeck]);
            const container = document.getElementById('assignmentContainer');
            
            liveGrimoire = playerNames.map((name, index) => {
                const role = shuffledDeck[index];
                const typeData = getRoleTypeAndColor(role, script);
                return {
                    seat: index + 1,
                    name: name,
                    role: role,
                    color: typeData.color,
                    tags: []
                };
            });

            container.innerHTML = liveGrimoire.map(p => `
                <div class="bg-gray-800 p-3 rounded-lg border border-gray-700 flex flex-col justify-center items-center shadow-sm py-4 gap-2">
                    <div class="flex items-center gap-2">
                        <span class="bg-gray-700 text-gray-400 font-bold px-2 py-1 rounded text-xs">${p.seat}</span>
                        <span class="text-white font-bold">${p.name || '未知玩家'}</span>
                    </div>
                    <span class="text-${p.color} font-black text-xl">${p.role}</span>
                </div>
            `).join('');
        }

        // --- Step 4 ---
        function startGame() {
            renderLiveGrimoire();
            showPage('page-step4', 4);
        }

        function goBackToStep3() {
            showPage('page-step3', 3);
        }

        function renderLiveGrimoire() {
            const container = document.getElementById('liveGrimoireContainer');
            container.innerHTML = liveGrimoire.map((player, idx) => `
                <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-md flex flex-col h-full relative" id="live-card-${idx}">
                    <div class="flex justify-between items-start mb-1">
                        <div class="font-bold text-gray-500 text-xs uppercase">座位 ${player.seat}</div>
                        <div class="text-${player.color} font-black text-lg">${player.role}</div>
                    </div>
                    <div class="text-white font-bold text-lg mb-3 pb-2 border-b border-gray-700 truncate" title="${player.name || '未知玩家'}">${player.name || '未知玩家'}</div>

                    <!-- Tags Container -->
                    <div class="flex flex-wrap gap-1.5 mb-4 min-h-[28px]" id="tags-${idx}">
                        ${renderTagsHTML(idx)}
                    </div>

                    <div class="mt-auto pt-3 border-t border-gray-700">
                        <div class="flex gap-2 mb-2">
                            <select id="presetStatus-${idx}" class="bg-gray-900 border border-gray-600 text-gray-300 text-xs p-1.5 rounded flex-1 outline-none focus:border-red-500">
                                <option value="">+ 快捷状态...</option>
                                <option value="💀 死亡">💀 死亡</option>
                                <option value="🍷 醉酒/中毒">🍷 醉酒/中毒</option>
                                <option value="🛡️ 受保护">🛡️ 受保护</option>
                                <option value="🎯 被标记">🎯 被标记</option>
                                <option value="🤪 疯狂">🤪 疯狂</option>
                                <option value="🎟️ 无投票权">🎟️ 无投票权</option>
                            </select>
                            <button onclick="addPresetTag(${idx})" class="bg-gray-700 hover:bg-gray-600 text-white text-xs px-3 rounded font-bold transition">添加</button>
                        </div>
                        <div class="flex gap-2">
                            <input type="text" id="customTagInput-${idx}" placeholder="自定义标签..." class="w-full bg-gray-900 border border-gray-600 text-white text-xs p-1.5 rounded outline-none focus:border-red-500">
                            <button onclick="addCustomTag(${idx})" class="bg-red-800 hover:bg-red-700 text-white text-xs px-3 rounded font-bold transition">+</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderTagsHTML(idx) {
            const tags = liveGrimoire[idx].tags;
            if (tags.length === 0) return `<span class="text-xs text-gray-600 italic mt-1">健康 / 无状态</span>`;

            return tags.map(t => {
                let color = "bg-gray-700 text-gray-200 border-gray-500";
                if (t === "💀 死亡") color = "bg-red-900 text-white border-red-700";
                else if (t === "🍷 醉酒/中毒") color = "bg-purple-900 text-white border-purple-700";
                else if (t === "🎟️ 无投票权") color = "bg-orange-900 text-white border-orange-700";

                return `<span class="text-xs px-2 py-1 rounded-md border ${color} flex items-center gap-1 cursor-pointer hover:opacity-80 transition shadow-sm" onclick="removeTag(${idx}, '${t}')">
                    ${t} <span class="opacity-50 hover:opacity-100 ml-1">×</span>
                </span>`;
            }).join('');
        }

        function addPresetTag(idx) {
            const select = document.getElementById(`presetStatus-${idx}`);
            const val = select.value;
            if (val) {
                if (!liveGrimoire[idx].tags.includes(val)) {
                    liveGrimoire[idx].tags.push(val);
                    document.getElementById(`tags-${idx}`).innerHTML = renderTagsHTML(idx);
                }
                select.value = "";
            }
        }

        function addCustomTag(idx) {
            const input = document.getElementById(`customTagInput-${idx}`);
            const val = input.value.trim();
            if (val && val.length <= 12) {
                if (!liveGrimoire[idx].tags.includes(val)) {
                    liveGrimoire[idx].tags.push(val);
                    document.getElementById(`tags-${idx}`).innerHTML = renderTagsHTML(idx);
                }
                input.value = "";
            } else if (val.length > 12) {
                alert("自定义标签太长了，请控制在12个字符以内。");
            }
        }

        function removeTag(idx, tag) {
            const tagIdx = liveGrimoire[idx].tags.indexOf(tag);
            if (tagIdx > -1) {
                liveGrimoire[idx].tags.splice(tagIdx, 1);
                document.getElementById(`tags-${idx}`).innerHTML = renderTagsHTML(idx);
            }
        }

        function resetGame() {
            if(confirm("确定要结束本局游戏吗？这会将您带回首页并丢失所有记录。")) {
                goToStep1();
            }
        }

        // --- Balance Analysis in Live Mode ---
        function analyzeBalance() {
            document.getElementById('balanceResult').classList.add('hidden');
            document.getElementById('balanceLoading').classList.remove('hidden');
            document.getElementById('analyzeBtn').disabled = true;
            document.getElementById('analyzeBtn').classList.add('opacity-50');

            setTimeout(() => {
                const phase = document.getElementById('phase').value;
                const adv = document.getElementById('advantage').value;
                
                // Read from live tags instead of checkboxes
                let hasDrunk = false, hasMad = false, hasRez = false, hasOutsider = false;
                const scriptKey = document.getElementById('scriptSelect').value;
                const script = SCRIPTS[scriptKey];
                
                liveGrimoire.forEach(p => {
                    if (p.tags.some(t => t.includes('醉酒') || t.includes('中毒'))) hasDrunk = true;
                    if (p.tags.some(t => t.includes('疯狂'))) hasMad = true;
                    if (script.outsiders.includes(p.role)) hasOutsider = true;
                    if (["水手","弄臣","茶艺师","和平主义者","旅店老板"].includes(p.role)) hasRez = true;
                });

                let html = "";
                if (adv === "good_strong") {
                    html += `<span class="text-yellow-400 font-bold">⚠️ 好人优势极大</span>\n`;
                    html += `🛠️ 核心策略：停止发放决定性的真实信息。\n`;
                    if (hasDrunk) html += `🍷 场上存在醉酒/中毒，请向其提供极其合理但完全错误的线索，引导抗推。\n`;
                    if (hasMad) html += `🤪 从严判定疯狂状态，随时准备处决以剥夺好人轮次。\n`;
                    if (hasRez) html += `🛡️ 动用一切可用机制保护恶魔或核心爪牙免死。\n`;
                    if (phase === "late") html += `⏱️ 赛点：如果恶魔已被锁死，立刻利用极端机制（多重死亡/毒死验证位）制造混乱，逼迫赌博。`;
                } 
                else if (adv === "evil_strong") {
                    html += `<span class="text-red-400 font-bold">⚠️ 邪恶优势极大</span>\n`;
                    html += `🛠️ 核心策略：天降甘霖，为好人提供绝地反击的线索。\n`;
                    html += `✨ 接下来的夜晚，向清醒的神职提供最核心、直白的真实信息。\n`;
                    if (hasDrunk) html += `🍷 给中毒/醉酒玩家发放“正确”或“无用但不致命”的信息，停止带偏。\n`;
                    if (hasOutsider) html += `🤡 对外乡人的负面技能进行“从宽”处理。\n`;
                    if (phase === "late") html += `⏱️ 赛点：白天投票给予更多宽容，恶魔失误时不要帮其圆谎。`;
                } 
                else {
                    html += `<span class="text-green-400 font-bold">⚖️ 势均力敌</span>\n`;
                    html += `🛠️ 核心策略：维持现状，完全按照标准概率和客观规则发放信息。\n`;
                    html += `🎯 关注边缘玩家：通过非致命夜间互动拉升他们的参与感。\n`;
                    if (hasDrunk) html += `🍷 维持常态的醉酒/中毒干扰，真假参半。\n`;
                    html += `💡 最好的控场就是让玩家感觉不到你在控场。`;
                }

                document.getElementById('balanceLoading').classList.add('hidden');
                document.getElementById('balanceResult').classList.remove('hidden');
                document.getElementById('balanceResult').innerHTML = html;
                document.getElementById('analyzeBtn').disabled = false;
                document.getElementById('analyzeBtn').classList.remove('opacity-50');
            }, 1000);
        }
    </script>
</body>
</html>
