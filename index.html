<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>血染钟楼 - AI说书人助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Serif SC', serif; background-color: #1a1a1a; background-image: radial-gradient(#2d1b1b 1px, transparent 1px); background-size: 20px 20px; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #e53e3e; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tab-active { background-color: #7f1d1d; border-color: #b91c1c; color: white; }
        .tab-inactive { background-color: #1f2937; border-color: #374151; color: #9ca3af; }
        .glass-panel { background: rgba(17, 24, 39, 0.85); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="text-gray-200 min-h-screen p-4 md:p-8 flex justify-center items-start">
    <div class="max-w-4xl w-full glass-panel border border-red-900 p-6 md:p-10 rounded-2xl shadow-2xl relative overflow-hidden mt-2">
        <!-- Decoration -->
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-red-800 via-red-500 to-red-800"></div>
        
        <h1 class="text-3xl md:text-4xl font-black mb-2 text-center text-red-500 tracking-wider">血染钟楼</h1>
        <h2 class="text-xl md:text-2xl font-bold mb-8 text-center text-gray-400">AI 说书人助手</h2>
        
        <!-- Tabs -->
        <div class="flex space-x-2 mb-8 border-b border-gray-700 pb-4">
            <button onclick="switchTab('setupTab')" id="btn-setupTab" class="flex-1 py-3 px-2 md:px-4 rounded-xl font-bold text-center border transition-all tab-active text-sm md:text-base">🎲 初始板子生成</button>
            <button onclick="switchTab('liveTab')" id="btn-liveTab" class="flex-1 py-3 px-2 md:px-4 rounded-xl font-bold text-center border transition-all tab-inactive text-sm md:text-base hidden">📜 实时魔典</button>
            <button onclick="switchTab('balanceTab')" id="btn-balanceTab" class="flex-1 py-3 px-2 md:px-4 rounded-xl font-bold text-center border transition-all tab-inactive text-sm md:text-base">⚖️ 场控平衡建议</button>
        </div>

        <!-- ==================== Setup Tab ==================== -->
        <div id="setupTab" class="space-y-6 block">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block mb-2 font-bold text-red-400">玩家人数 (8-15)</label>
                    <input type="number" id="playerCount" min="8" max="15" value="10" class="w-full bg-gray-800 border border-gray-700 text-white p-3 rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
                </div>
                <div>
                    <label class="block mb-2 font-bold text-red-400">选择剧本</label>
                    <select id="scriptSelect" class="w-full bg-gray-800 border border-gray-700 text-white p-3 rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
                        <option value="tb">暗流涌动 (Trouble Brewing)</option>
                        <option value="bmr">暗月初升 (Bad Moon Rising)</option>
                        <option value="snv">梦殒春宵 (Sects & Violets)</option>
                    </select>
                </div>
            </div>
            
            <div class="pt-2">
                <label class="block mb-3 font-bold text-red-400 flex items-center justify-between">
                    <span>座位分配与角色锁定</span>
                </label>
                <div id="lockedRolesContainer" class="grid grid-cols-2 md:grid-cols-3 gap-3">
                    <!-- Dropdowns and Name Inputs generated by JS -->
                </div>
                <p class="text-gray-500 text-xs mt-3">💡 填写玩家名（可选），在下拉菜单中锁定特定角色，剩余座位保持“随机”。系统将自动补齐分配魔典。</p>
            </div>

            <div class="flex gap-3 mt-6">
                <button onclick="generateSetup()" id="genBtn" class="flex-1 bg-gray-800 hover:bg-gray-700 border border-gray-600 text-white font-bold py-4 rounded-xl shadow transition-all flex justify-center items-center gap-2 text-lg">
                    <span>🎲 随机分配空位</span>
                </button>
                <button onclick="startGame()" id="startBtn" class="flex-1 bg-gradient-to-r from-red-800 to-red-900 hover:from-red-700 hover:to-red-800 border border-red-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all transform hover:scale-[1.02] flex justify-center items-center gap-2 text-lg hidden">
                    <span>🚀 开始游戏 (锁定魔典)</span>
                </button>
            </div>

            <!-- Loading & Result -->
            <div id="genLoading" class="hidden flex justify-center items-center gap-3 mt-8 text-gray-400">
                <div class="spinner"></div>
                <span>正在翻阅魔典...</span>
            </div>

            <div id="genResult" class="hidden mt-8">
                <div class="bg-gray-800 border border-gray-700 p-6 rounded-xl relative shadow-inner">
                    <div class="absolute -top-3 left-6 bg-red-600 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider text-white shadow-sm">魔典配置清单</div>
                    <div id="gen-content" class="text-gray-300 leading-relaxed text-base mt-2"></div>
                </div>
            </div>
        </div>

        <!-- ==================== Live Grimoire Tab ==================== -->
        <div id="liveTab" class="space-y-6 hidden">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-xl font-bold text-red-400">实时魔典追踪</h3>
                <button onclick="resetGame()" class="text-sm bg-gray-800 hover:bg-gray-700 border border-gray-600 px-4 py-2 rounded-lg text-white transition">结束游戏</button>
            </div>
            <p class="text-xs text-gray-500 mb-4">在此处为每个玩家标记死亡、醉酒或其他自定义状态。状态可随时添加或点击移除。</p>
            
            <div id="liveGrimoireContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Live Player Cards generated by JS -->
            </div>
        </div>

        <!-- ==================== Balance Tab ==================== -->
        <div id="balanceTab" class="space-y-6 hidden">
            <div>
                <label class="block mb-2 font-bold text-red-400 text-lg">当前游戏阶段</label>
                <select id="phase" class="w-full bg-gray-800 border border-gray-700 text-white p-3 rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
                    <option value="early">🌙 游戏前期 (第1-2天，信息收集中)</option>
                    <option value="mid">🔥 游戏中期 (第3-4天，逻辑交锋期)</option>
                    <option value="late">⚔️ 游戏后期 (赛点/最后一天，决战)</option>
                </select>
            </div>

            <div>
                <label class="block mb-2 font-bold text-red-400 text-lg">当前局面倾向</label>
                <select id="advantage" class="w-full bg-gray-800 border border-gray-700 text-white p-3 rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
                    <option value="good_strong">🔵 好人优势极大 (恶魔被锁定/邪恶方暴露)</option>
                    <option value="balanced">⚖️ 势均力敌 (局势焦灼，胜负难分)</option>
                    <option value="evil_strong">🔴 邪恶优势极大 (好人死伤惨重/核心神职全错)</option>
                </select>
            </div>

            <div>
                <label class="block mb-3 font-bold text-red-400 text-lg">场上存在的可控变量 (多选)</label>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <label class="flex items-center bg-gray-800 p-3 rounded-lg border border-gray-700 cursor-pointer hover:bg-gray-700 transition">
                        <input type="checkbox" id="has_drunk" class="w-5 h-5 text-red-600 rounded bg-gray-900 border-gray-600 focus:ring-red-500">
                        <span class="ml-3">🍷 醉酒/中毒机制</span>
                    </label>
                    <label class="flex items-center bg-gray-800 p-3 rounded-lg border border-gray-700 cursor-pointer hover:bg-gray-700 transition">
                        <input type="checkbox" id="has_mad" class="w-5 h-5 text-red-600 rounded bg-gray-900 border-gray-600 focus:ring-red-500">
                        <span class="ml-3">🤪 疯狂机制 (如洗脑师)</span>
                    </label>
                    <label class="flex items-center bg-gray-800 p-3 rounded-lg border border-gray-700 cursor-pointer hover:bg-gray-700 transition">
                        <input type="checkbox" id="has_rez" class="w-5 h-5 text-red-600 rounded bg-gray-900 border-gray-600 focus:ring-red-500">
                        <span class="ml-3">⚰️ 死亡复活/免死判定</span>
                    </label>
                    <label class="flex items-center bg-gray-800 p-3 rounded-lg border border-gray-700 cursor-pointer hover:bg-gray-700 transition">
                        <input type="checkbox" id="has_outsider" class="w-5 h-5 text-red-600 rounded bg-gray-900 border-gray-600 focus:ring-red-500">
                        <span class="ml-3">🃏 外乡人技能判定</span>
                    </label>
                </div>
            </div>

            <button onclick="analyzeBalance()" id="analyzeBtn" class="w-full bg-gradient-to-r from-red-800 to-red-900 hover:from-red-700 hover:to-red-800 border border-red-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all transform hover:scale-[1.02] flex justify-center items-center gap-3 text-lg">
                <span>🔮 让 AI 分析并生成平衡策略</span>
            </button>

            <div id="loading" class="hidden flex justify-center items-center gap-3 mt-8 text-gray-400">
                <div class="spinner"></div>
                <span>大恶魔正在推演命运的丝线...</span>
            </div>

            <div id="result" class="hidden mt-8">
                <div class="bg-gray-800 border border-gray-700 p-6 rounded-xl relative shadow-inner">
                    <div class="absolute -top-3 left-6 bg-red-600 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider text-white shadow-sm">AI 说书人建议</div>
                    <div id="advice-content" class="text-gray-300 leading-relaxed text-base mt-2"></div>
                </div>
            </div>
        </div>
        
        <p class="text-center text-gray-600 mt-8 text-xs">此工具辅助说书人构建剧本和控制游戏节奏，请根据现场玩家体验主观微调。</p>
    </div>

    <script>
        // --- 核心角色数据 ---
        const SCRIPTS = {
            "tb": {
                name: "暗流涌动 (Trouble Brewing)",
                townsfolk: ["洗衣妇", "图书管理员", "调查员", "厨师", "共情者", "占卜师", "送葬者", "僧侣", "守鸦人", "处女", "杀手", "士兵", "镇长"],
                outsiders: ["管家", "醉汉", "隐士", "圣徒"],
                minions: ["毒师", "间谍", "猩红女人", "男爵"],
                demons: ["小恶魔"]
            },
            "bmr": {
                name: "暗月初升 (Bad Moon Rising)",
                townsfolk: ["祖母", "水手", "侍女", "驱魔人", "旅店老板", "赌徒", "八卦", "侍臣", "教授", "吟游诗人", "茶艺师", "和平主义者", "弄臣"],
                outsiders: ["莽夫", "月之子", "修补匠", "疯子"],
                minions: ["教父", "魔鬼代言人", "刺客", "主谋"],
                demons: ["僵怖", "普卡", "沙巴洛斯", "珀"]
            },
            "snv": {
                name: "梦殒春宵 (Sects & Violets)",
                townsfolk: ["钟表匠", "筑梦师", "舞蛇人", "数学家", "卖花女孩", "城镇公告员", "神谕者", "博学者", "女裁缝", "哲学家", "艺术家", "杂耍艺人", "贤者"],
                outsiders: ["畸形秀演员", "理发师", "心上人", "呆瓜"],
                minions: ["镜像双子", "女巫", "洗脑师", "麻脸巫婆"],
                demons: ["方古", "亡骨魔", "诺-达鲺", "涡流"]
            }
        };

        const DIST = {
            8: [5, 1, 1, 1], 9: [5, 2, 1, 1], 10: [7, 0, 2, 1], 11: [7, 1, 2, 1],
            12: [7, 2, 2, 1], 13: [9, 0, 3, 1], 14: [9, 1, 3, 1], 15: [9, 2, 3, 1]
        };

        // --- Live State ---
        let liveGrimoire = []; // { seat: 1, name: "", role: "", type: "...", tags: [] }

        // --- 初始化及事件绑定 ---
        document.getElementById('playerCount').addEventListener('change', renderRoleDropdowns);
        document.getElementById('scriptSelect').addEventListener('change', renderRoleDropdowns);
        
        window.addEventListener('DOMContentLoaded', () => {
            renderRoleDropdowns();
        });

        // --- 选项卡切换 ---
        function switchTab(tabId) {
            document.getElementById('setupTab').classList.add('hidden');
            document.getElementById('liveTab').classList.add('hidden');
            document.getElementById('balanceTab').classList.add('hidden');
            
            ['setupTab', 'liveTab', 'balanceTab'].forEach(t => {
                const btn = document.getElementById('btn-' + t);
                if (btn) btn.className = "flex-1 py-3 px-2 md:px-4 rounded-xl font-bold text-center border transition-all tab-inactive text-sm md:text-base" + (btn.classList.contains('hidden') ? ' hidden' : '');
            });

            document.getElementById(tabId).classList.remove('hidden');
            const activeBtn = document.getElementById('btn-' + tabId);
            activeBtn.className = "flex-1 py-3 px-2 md:px-4 rounded-xl font-bold text-center border transition-all tab-active text-sm md:text-base" + (activeBtn.classList.contains('hidden') ? ' hidden' : '');
        }

        // --- 动态渲染座位、姓名与下拉菜单 ---
        function renderRoleDropdowns() {
            let count = parseInt(document.getElementById('playerCount').value);
            if (isNaN(count) || count < 8) count = 8;
            if (count > 15) count = 15;

            const scriptKey = document.getElementById('scriptSelect').value;
            const script = SCRIPTS[scriptKey];
            const container = document.getElementById('lockedRolesContainer');
            
            // 记住之前的选择和名字
            const currentRoles = [];
            const currentNames = [];
            container.querySelectorAll('.seat-card').forEach((card, i) => {
                currentNames.push(card.querySelector('.player-name').value);
                currentRoles.push(card.querySelector('.role-select').value);
            });

            container.innerHTML = '';
            
            for (let i = 0; i < count; i++) {
                const card = document.createElement('div');
                card.className = "seat-card bg-gray-800 p-3 rounded-xl border border-gray-700 flex flex-col gap-2";
                
                const header = document.createElement('div');
                header.className = "text-xs font-bold text-gray-500 uppercase tracking-wider";
                header.innerText = `座位 ${i + 1}`;
                card.appendChild(header);

                const nameInput = document.createElement('input');
                nameInput.type = "text";
                nameInput.className = "player-name w-full bg-gray-900 border border-gray-600 text-white text-sm p-2 rounded focus:ring-1 focus:ring-red-500 outline-none";
                nameInput.placeholder = "玩家名 (选填)";
                if (currentNames[i]) nameInput.value = currentNames[i];
                card.appendChild(nameInput);
                
                const selectWrap = document.createElement('div');
                selectWrap.className = "relative";
                
                const select = document.createElement('select');
                select.className = "role-select w-full bg-gray-900 border border-gray-600 text-gray-300 text-sm p-2 rounded focus:ring-1 focus:ring-red-500 outline-none appearance-none";
                
                let optionsHTML = `<option value="">🎲 随机角色</option>`;
                optionsHTML += `<optgroup label="👼 村民">` + script.townsfolk.map(r => `<option value="${r}">${r}</option>`).join('') + `</optgroup>`;
                optionsHTML += `<optgroup label="🤡 外乡人">` + script.outsiders.map(r => `<option value="${r}">${r}</option>`).join('') + `</optgroup>`;
                optionsHTML += `<optgroup label="😈 爪牙">` + script.minions.map(r => `<option value="${r}">${r}</option>`).join('') + `</optgroup>`;
                optionsHTML += `<optgroup label="👿 恶魔">` + script.demons.map(r => `<option value="${r}">${r}</option>`).join('') + `</optgroup>`;
                
                select.innerHTML = optionsHTML;
                
                if (currentRoles[i] && select.querySelector(`option[value="${currentRoles[i]}"]`)) {
                    select.value = currentRoles[i];
                    updateSelectStyle(select);
                }

                select.addEventListener('change', function() { updateSelectStyle(this); });

                selectWrap.appendChild(select);
                
                const arrow = document.createElement('div');
                arrow.className = "pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500";
                arrow.innerHTML = `<svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>`;
                selectWrap.appendChild(arrow);

                card.appendChild(selectWrap);
                container.appendChild(card);
            }

            document.getElementById('startBtn').classList.add('hidden');
            document.getElementById('genResult').classList.add('hidden');
        }

        function updateSelectStyle(select) {
            if(select.value) {
                select.classList.add('text-white', 'border-red-800', 'bg-red-950');
            } else {
                select.classList.remove('text-white', 'border-red-800', 'bg-red-950');
            }
        }

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function pickRoles(pool, count, locked) {
            const available = pool.filter(r => !locked.includes(r));
            return shuffle([...available]).slice(0, Math.max(0, count));
        }

        function getRoleTypeAndColor(role, script) {
            if (script.townsfolk.includes(role)) return { type: 'townsfolk', color: 'blue-400' };
            if (script.outsiders.includes(role)) return { type: 'outsider', color: 'yellow-400' };
            if (script.minions.includes(role)) return { type: 'minion', color: 'purple-400' };
            if (script.demons.includes(role)) return { type: 'demon', color: 'red-500' };
            return { type: 'unknown', color: 'gray-300' };
        }

        // --- 生成初始板子并随机分配到空位 ---
        function generateSetup() {
            document.getElementById('genResult').classList.add('hidden');
            document.getElementById('genLoading').classList.remove('hidden');
            document.getElementById('genBtn').disabled = true;

            setTimeout(() => {
                let count = parseInt(document.getElementById('playerCount').value);
                const scriptKey = document.getElementById('scriptSelect').value;
                const script = SCRIPTS[scriptKey];
                
                const selects = document.getElementById('lockedRolesContainer').querySelectorAll('.role-select');
                
                // 获取当前所有手动锁定的角色
                const lockedRaw = Array.from(selects).map(s => s.value).filter(v => v !== "");
                const lockedUnique = [...new Set(lockedRaw)]; // 去重
                
                // 如果发现重复锁定，提示并阻止
                if (lockedRaw.length !== lockedUnique.length) {
                    alert("错误：您在下拉菜单中锁定了重复的角色，请检查！");
                    document.getElementById('genLoading').classList.add('hidden');
                    document.getElementById('genBtn').disabled = false;
                    return;
                }

                let lockedT = [], lockedO = [], lockedM = [], lockedD = [];
                lockedUnique.forEach(r => {
                    if (script.townsfolk.includes(r)) lockedT.push(r);
                    else if (script.outsiders.includes(r)) lockedO.push(r);
                    else if (script.minions.includes(r)) lockedM.push(r);
                    else if (script.demons.includes(r)) lockedD.push(r);
                });

                let [t_cnt, o_cnt, m_cnt, d_cnt] = [...DIST[count]];
                let adjustedStr = "";
                
                if (lockedUnique.includes("男爵")) { o_cnt += 2; t_cnt -= 2; adjustedStr += " 【男爵】使外乡人+2；"; }
                if (lockedUnique.includes("方古")) { o_cnt += 1; t_cnt -= 1; adjustedStr += " 【方古】使外乡人+1；"; }
                if (lockedUnique.includes("教父")) { 
                    if (o_cnt === 0 || Math.random() > 0.5) { o_cnt += 1; t_cnt -= 1; adjustedStr += " 【教父】使外乡人+1；"; } 
                    else { o_cnt -= 1; t_cnt += 1; adjustedStr += " 【教父】使外乡人-1；"; }
                }
                if (o_cnt < 0) o_cnt = 0;

                const pickT = Math.max(0, t_cnt - lockedT.length);
                const pickO = Math.max(0, o_cnt - lockedO.length);
                const pickM = Math.max(0, m_cnt - lockedM.length);
                const pickD = Math.max(0, d_cnt - lockedD.length);

                const generatedT = pickRoles(script.townsfolk, pickT, lockedT);
                const generatedO = pickRoles(script.outsiders, pickO, lockedO);
                const generatedM = pickRoles(script.minions, pickM, lockedM);
                const generatedD = pickRoles(script.demons, pickD, lockedD);

                // 把生成的未分配角色汇总并打乱
                const unassignedRoles = shuffle([...generatedT, ...generatedO, ...generatedM, ...generatedD]);

                // 将未分配角色填入为空的下拉菜单
                let assignIdx = 0;
                selects.forEach(select => {
                    if (select.value === "") {
                        if (assignIdx < unassignedRoles.length) {
                            select.value = unassignedRoles[assignIdx];
                            updateSelectStyle(select);
                            assignIdx++;
                        }
                    }
                });

                // 如果座位数不够放（理论上不会，但防患未然），做个保护
                const finalT = [...lockedT, ...generatedT];
                const finalO = [...lockedO, ...generatedO];
                const finalM = [...lockedM, ...generatedM];
                const finalD = [...lockedD, ...generatedD];

                const totalActual = finalT.length + finalO.length + finalM.length + finalD.length;

                // --- Build summary ---
                let html = `
                    <div class="mb-4 pb-2 border-b border-gray-700">
                        <h3 class="text-xl font-bold text-red-400 mb-1">【魔典分析】 - ${script.name}</h3>
                        <p class="text-gray-400 text-sm">👥 <span class="text-white font-bold">总人数</span>: ${totalActual}人 (村民${finalT.length} / 外乡人${finalO.length} / 爪牙${finalM.length} / 恶魔${finalD.length})</p>
                    </div>
                `;
                if (adjustedStr) html += `<div class="mb-4 text-yellow-500 text-sm bg-yellow-900 bg-opacity-20 p-2 rounded border border-yellow-800">*(注: 由于技能影响，基础比例发生改变：${adjustedStr})*</div>`;

                html += `<h3 class="text-lg font-bold text-red-400 mb-3">【AI 构筑解析】</h3><ul class="space-y-3 text-gray-300 list-none pl-1">`;
                
                let aiComments = [];
                if (scriptKey === "tb") {
                    if (finalD.includes("小恶魔")) {
                        let c = `<li>💡 <span class="text-white font-bold">针对【小恶魔】</span>：小恶魔拥有自杀传刀的能力。`;
                        if (finalM.includes("猩红女人")) c += `配合【猩红女人】保底，邪恶阵营容错率极高。</li>`;
                        else c += `但本次无【猩红女人】，恶魔的传刀需极为谨慎。</li>`;
                        aiComments.push(c);
                    }
                    if (finalT.includes("占卜师") && !finalO.includes("隐士")) aiComments.push(`<li>💡 <span class="text-white font-bold">针对【占卜师】</span>：场上无【隐士】干扰，占卜师信息非常犀利。</li>`);
                    if (finalM.includes("毒师")) aiComments.push(`<li>💡 <span class="text-white font-bold">强力干扰</span>：【毒师】保证了好人无法无脑信任单一信息源。</li>`);
                } else if (scriptKey === "bmr") {
                    if (finalD.includes("普卡")) aiComments.push(`<li>💡 <span class="text-white font-bold">针对【普卡】</span>：普卡的毒会延时死亡，提醒中毒的村民不要盲目自信。</li>`);
                    if (finalD.includes("僵怖")) aiComments.push(`<li>💡 <span class="text-white font-bold">针对【僵怖】</span>：它能伪装死亡，说书人需小心处理白天的处决反馈。</li>`);
                    if (finalT.includes("水手") || finalT.includes("弄臣") || finalT.includes("茶艺师")) aiComments.push(`<li>💡 <span class="text-white font-bold">不死机制</span>：场上存在多种不死机制，这是好人盘逻辑的基石，但也让恶魔的击杀更具威慑力。</li>`);
                } else if (scriptKey === "snv") {
                    if (finalD.includes("涡流")) aiComments.push(`<li>💡 <span class="text-white font-bold">针对【涡流】</span>：所有好人得到的信息都是假的！考验好人能否快速发现涡流局。</li>`);
                    if (finalD.includes("方古")) aiComments.push(`<li>💡 <span class="text-white font-bold">针对【方古】</span>：恶魔可以跳跃到外乡人身上。外乡人在此局中不仅是累赘，更是巨大威胁。</li>`);
                    if (finalT.includes("艺术家") || finalT.includes("博学者")) aiComments.push(`<li>💡 <span class="text-white font-bold">信息爆发</span>：艺术家和博学者能提供终结比赛的信息，邪恶方必须优先解决他们。</li>`);
                }
                aiComments.push(`<li>🎯 <span class="text-white font-bold">建议</span>：请检查上方座位分配，可随意调整。确认无误后，点击“开始游戏”进入实时追踪模式。</li>`);
                html += aiComments.join('') + `</ul>`;

                document.getElementById('genLoading').classList.add('hidden');
                document.getElementById('genResult').classList.remove('hidden');
                document.getElementById('gen-content').innerHTML = html;
                document.getElementById('genBtn').disabled = false;
                
                // Show Start Game button
                document.getElementById('startBtn').classList.remove('hidden');
            }, 800);
        }

        // --- 开始游戏 -> 进入 Live 模式 ---
        function startGame() {
            const container = document.getElementById('lockedRolesContainer');
            const scriptKey = document.getElementById('scriptSelect').value;
            const script = SCRIPTS[scriptKey];
            
            liveGrimoire = [];
            let allFilled = true;

            container.querySelectorAll('.seat-card').forEach((card, index) => {
                const name = card.querySelector('.player-name').value.trim();
                const role = card.querySelector('.role-select').value;
                if (!role) allFilled = false;
                
                const typeData = getRoleTypeAndColor(role, script);
                
                liveGrimoire.push({
                    seat: index + 1,
                    name: name,
                    role: role,
                    color: typeData.color,
                    tags: []
                });
            });

            if (!allFilled) {
                alert("还有座位没有分配角色！请先完成所有座位的角色分配。");
                return;
            }

            renderLiveGrimoire();
            
            // Unhide and switch to live tab
            const liveTabBtn = document.getElementById('btn-liveTab');
            liveTabBtn.classList.remove('hidden');
            switchTab('liveTab');
        }

        function renderLiveGrimoire() {
            const container = document.getElementById('liveGrimoireContainer');
            container.innerHTML = liveGrimoire.map((player, idx) => `
                <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-md flex flex-col h-full relative" id="live-card-${idx}">
                    <div class="flex justify-between items-start mb-1">
                        <div class="font-bold text-gray-500 text-xs uppercase">座位 ${player.seat}</div>
                        <div class="text-${player.color} font-black text-lg">${player.role}</div>
                    </div>
                    <div class="text-white font-bold text-lg mb-3 pb-2 border-b border-gray-700 truncate" title="${player.name || '未知玩家'}">${player.name || '未知玩家'}</div>

                    <!-- Tags Container -->
                    <div class="flex flex-wrap gap-1.5 mb-4 min-h-[28px]" id="tags-${idx}">
                        ${renderTagsHTML(idx)}
                    </div>

                    <div class="mt-auto pt-3 border-t border-gray-700">
                        <div class="flex gap-2 mb-2">
                            <select id="presetStatus-${idx}" class="bg-gray-900 border border-gray-600 text-gray-300 text-xs p-1.5 rounded flex-1 outline-none focus:border-red-500">
                                <option value="">+ 快捷状态...</option>
                                <option value="💀 死亡">💀 死亡</option>
                                <option value="🍷 醉酒/中毒">🍷 醉酒/中毒</option>
                                <option value="🛡️ 受保护">🛡️ 受保护</option>
                                <option value="🎯 被标记">🎯 被标记</option>
                                <option value="🤪 疯狂">🤪 疯狂</option>
                                <option value="🎟️ 无投票权">🎟️ 无投票权</option>
                            </select>
                            <button onclick="addPresetTag(${idx})" class="bg-gray-700 hover:bg-gray-600 text-white text-xs px-3 rounded font-bold transition">添加</button>
                        </div>
                        <div class="flex gap-2">
                            <input type="text" id="customTagInput-${idx}" placeholder="自定义标签..." class="w-full bg-gray-900 border border-gray-600 text-white text-xs p-1.5 rounded outline-none focus:border-red-500">
                            <button onclick="addCustomTag(${idx})" class="bg-red-800 hover:bg-red-700 text-white text-xs px-3 rounded font-bold transition">+</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderTagsHTML(idx) {
            const tags = liveGrimoire[idx].tags;
            if (tags.length === 0) return `<span class="text-xs text-gray-600 italic mt-1">健康 / 无状态</span>`;

            return tags.map(t => {
                let color = "bg-gray-700 text-gray-200 border-gray-500";
                if (t === "💀 死亡") color = "bg-red-900 text-white border-red-700";
                else if (t === "🍷 醉酒/中毒") color = "bg-purple-900 text-white border-purple-700";
                else if (t === "🎟️ 无投票权") color = "bg-orange-900 text-white border-orange-700";

                return `<span class="text-xs px-2 py-1 rounded-md border ${color} flex items-center gap-1 cursor-pointer hover:opacity-80 transition shadow-sm" onclick="removeTag(${idx}, '${t}')">
                    ${t} <span class="opacity-50 hover:opacity-100 ml-1">×</span>
                </span>`;
            }).join('');
        }

        function addPresetTag(idx) {
            const select = document.getElementById(`presetStatus-${idx}`);
            const val = select.value;
            if (val) {
                if (!liveGrimoire[idx].tags.includes(val)) {
                    liveGrimoire[idx].tags.push(val);
                    document.getElementById(`tags-${idx}`).innerHTML = renderTagsHTML(idx);
                }
                select.value = "";
            }
        }

        function addCustomTag(idx) {
            const input = document.getElementById(`customTagInput-${idx}`);
            const val = input.value.trim();
            if (val && val.length <= 12) { // limit length slightly
                if (!liveGrimoire[idx].tags.includes(val)) {
                    liveGrimoire[idx].tags.push(val);
                    document.getElementById(`tags-${idx}`).innerHTML = renderTagsHTML(idx);
                }
                input.value = "";
            } else if (val.length > 12) {
                alert("自定义标签太长了，请控制在12个字符以内。");
            }
        }

        function removeTag(idx, tag) {
            const tagIdx = liveGrimoire[idx].tags.indexOf(tag);
            if (tagIdx > -1) {
                liveGrimoire[idx].tags.splice(tagIdx, 1);
                document.getElementById(`tags-${idx}`).innerHTML = renderTagsHTML(idx);
            }
        }

        function resetGame() {
            if(confirm("确定要结束本局游戏吗？这会将您带回生成页面。")) {
                document.getElementById('btn-liveTab').classList.add('hidden');
                switchTab('setupTab');
            }
        }

        // --- 场控分析 ---
        function analyzeBalance() {
            document.getElementById('result').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('analyzeBtn').disabled = true;
            document.getElementById('analyzeBtn').classList.add('opacity-50');

            setTimeout(() => {
                const phase = document.getElementById('phase').value;
                const adv = document.getElementById('advantage').value;
                const hasDrunk = document.getElementById('has_drunk').checked;
                const hasMad = document.getElementById('has_mad').checked;
                const hasRez = document.getElementById('has_rez').checked;
                const hasOutsider = document.getElementById('has_outsider').checked;

                let html = "";

                if (adv === "good_strong") {
                    html += `<div class="mb-5 p-4 bg-yellow-900 bg-opacity-30 border border-yellow-700 rounded-lg">⚠️ <span class="text-yellow-400 font-bold text-lg">当前诊断：好人阵营优势过大，游戏可能过早结束。</span></div>`;
                    html += `<p class="mb-3"><span class="text-red-400 font-bold text-lg">🛠️ 核心策略：暗中扶持邪恶方，制造逻辑断层</span></p>`;
                    html += `<ul class="list-disc pl-6 space-y-2 text-gray-300 mb-5">`;
                    html += `<li><span class="text-white font-bold">信息干扰</span>：停止给好人发放决定性的真实信息。</li>`;
                    if (hasDrunk) html += `<li><span class="text-white font-bold">利用醉酒/中毒</span>：向受影响的关键神职提供极其合理但完全错误的线索。</li>`;
                    if (hasMad) html += `<li><span class="text-white font-bold">疯狂制裁</span>：从严判定疯狂状态，剥夺好人轮次。</li>`;
                    if (hasRez) html += `<li><span class="text-white font-bold">保留邪恶火种</span>：果断动用任何可用的免死/转移机制保护恶魔或核心爪牙。</li>`;
                    html += `</ul>`;
                    if (phase === "early") html += `<div class="p-3 bg-gray-800 rounded border border-gray-600 text-sm"><span class="text-white font-bold">⏱️ 阶段提醒 (前期)</span>：好人可能只是碰巧盲对。暗示爪牙去穿神职的衣服，不要做得太明显。</div>`;
                    else if (phase === "late") html += `<div class="p-3 bg-gray-800 rounded border border-gray-600 text-sm"><span class="text-white font-bold">⏱️ 阶段提醒 (后期)</span>：赛点将至！如果好人锁死恶魔，立刻制造多重死亡或毒死关键验证位制造混乱，逼迫好人进行赌博。</div>`;
                } 
                else if (adv === "evil_strong") {
                    html += `<div class="mb-5 p-4 bg-red-900 bg-opacity-30 border border-red-700 rounded-lg">⚠️ <span class="text-red-400 font-bold text-lg">当前诊断：邪恶阵营完全控场，好人面临崩盘体验极差。</span></div>`;
                    html += `<p class="mb-3"><span class="text-blue-400 font-bold text-lg">🛠️ 核心策略：天降甘霖，为好人提供绝地反击的线索</span></p>`;
                    html += `<ul class="list-disc pl-6 space-y-2 text-gray-300 mb-5">`;
                    html += `<li><span class="text-white font-bold">信息回调</span>：接下来的夜晚，向未中毒的神职提供最核心、最直白的真实信息。</li>`;
                    if (hasDrunk) html += `<li><span class="text-white font-bold">修正醉酒/中毒</span>：给中毒/醉酒的玩家发放“正确”或“无用但不致命”的信息。</li>`;
                    if (hasOutsider) html += `<li><span class="text-white font-bold">善待外乡人</span>：对外乡人的负面技能进行“从宽”处理。</li>`;
                    if (hasRez) html += `<li><span class="text-white font-bold">生命奇迹</span>：强行让一个高身份的好人活下来，作为好人的逻辑基石。</li>`;
                    html += `</ul>`;
                    if (phase === "late") html += `<div class="p-3 bg-gray-800 rounded border border-gray-600 text-sm"><span class="text-white font-bold">⏱️ 阶段提醒 (后期)</span>：这是好人最后的机会。白天投票给予更多宽容，如果恶魔失误，不要帮其圆谎。</div>`;
                } 
                else {
                    html += `<div class="mb-5 p-4 bg-green-900 bg-opacity-20 border border-green-800 rounded-lg">⚖️ <span class="text-green-400 font-bold text-lg">当前诊断：局势焦灼，两边势均力敌，游戏体验极佳。</span></div>`;
                    html += `<p class="mb-3"><span class="text-gray-300 font-bold text-lg">🛠️ 核心策略：维持现状，隐形旁观</span></p>`;
                    html += `<ul class="list-disc pl-6 space-y-2 text-gray-300 mb-5">`;
                    html += `<li><span class="text-white font-bold">标准裁决</span>：完全按照标准概率和客观规则发放信息。</li>`;
                    html += `<li><span class="text-white font-bold">关注边缘玩家</span>：通过非致命夜间互动拉升边缘玩家的参与感。</li>`;
                    if (hasDrunk) html += `<li><span class="text-white font-bold">常规干扰</span>：维持常态的醉酒/中毒干扰，真假参半。</li>`;
                    html += `</ul>`;
                    html += `<div class="p-3 bg-gray-800 rounded border border-gray-600 text-sm">💡 <span class="text-white font-bold">说书人座右铭</span>：最好的控场就是让玩家感觉不到你在控场。让他们为自己的推理和欺诈欢呼！</div>`;
                }

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('result').classList.remove('hidden');
                document.getElementById('advice-content').innerHTML = html;
                document.getElementById('analyzeBtn').disabled = false;
                document.getElementById('analyzeBtn').classList.remove('opacity-50');
            }, 1000);
        }
    </script>
</body>
</html>
